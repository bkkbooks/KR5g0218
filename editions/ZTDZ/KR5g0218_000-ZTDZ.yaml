body:
  text: 太上九真明科亦四太上告諸天帝王後聖君上相青童太極真人曰凡是後學得見上真三洞寳章祕経首目者皆東華書名金字上淸雖未超騰控轡紫庭皆是升度之人也然雖見此文而不知九真明科條檢儀式三洞竒文太上寳書不可得而便披也明科寳祕蔵於玄都之宫玉京金房之内不傳於世乃明三洞之淵𧷤摽衆真之儀格拔宿對於幽官度七玄於仙籍實緫落於萬道觧九隂之重責其妙可得立用其科可得肅厲今故摽出三品篇目以輔揚三竒素靈妙経可誡於後學使勤尚之人告慎於𡨋契諸天帝王後聖九玄帝君上相青童太極真人稽首敢問太上天尊至真上法髙秀玄澄落落萬宗玄寂虛凝妙超激玄法化三乗彌綸億劫量何可勝豈復稽於明科乎太上曰善子之言夫後生之徒自非玉虛之胤結自然而生者皆於混元淬流於囂穢也結有不純之行性有不專之羙雖希慕玄𧷤故心𢘆背伐舉止所乗莫不犯於過過生乎外㓕命乎内承此而學豈不去真逺哉如使三官報咎對在幽司禍延七祖罪累於身有犯斯過者而使悟於玄科有紏罰之制聖化之大復許有贖罪之法案科而用如此期真將必近矣為學之士而無此檢亦徒勞於精思無益於苦念也今故摽出九真三品明科自可授於後學應為真人者帝君上相青童太極真人於是退齋上清奉受素靈大有妙経九真科檢祕於金蔵玉匱衞以玉童玉女各三千人侍典靈文散香虛庭飛龍毒獸臣虬千尋奮爪雲墻備玉關也如是十天大聖九宫真仙一月三過莫不上登玄宫禀承明科禮拜於経文也上相青童君曰凡有金骨玉髓名叅青宫得有此文祕而施行於是承受之儀玄合上典施用節度與真同功贖罪㧞難宿結咸觧七玄之祖於是而欣已身昇騰上宴玉京也玄都九真明科上品傳経篇玄都上品第一篇曰大洞真経雌一寳経太上素靈大有妙経三奇之章髙上玉皇寳篇祕在九天之上大有之宫太玄靈䑓玉房之中上皇之初舊科経萬劫一傳三道正明學真格與髙上正科七千年内聴得三傳侍衛玉童玉女各七千人執香典靈案科傳授之法皆對告齋百日分金鈕為盟合玉童玉女依四極科不依科而傳罪延七祖幽魂充役吞火食炭負山運石以填無極之源己身抱風刀之罰身没形殘長閉地獄萬不得仙玄都上品第二篇曰傳大洞真経三十九章於後學者誓以上金十兩銅二十五斤金鈕五𩀱金魚玉龍各一枚青絲一兩纒鈕為盟雌一以上金五兩五色文繒各五十尺香一斤金鈕三𩀱太上素靈洞真玄経上金三兩紫紋百尺青繒二十七尺赤絲五兩香一斤丹一兩上皇以信誓心不得有闕闕則𧇊科師犯則遷侍経玉童玉女還於本宫不過三年身被風刀之考自然失経受者不依明科目皆失明形殘七祖父母充北酆之責萬劫還生非人之道學者慎之玄都上品第三篇曰凡有金名東華玉字上清得受太霄琅書瓊文帝章紫度炎光玄真變経上清變化七十四方九真中経丹景道精𨼆地八術觧形遯變流景玉経七變儛天皆九天真王元始天王太上天帝君中央黄老君受於太空之中九玄之内虚無之髙章也皆祕在太上靈都之宫紫房之内三元君主侍衛玉童玉女皆三千人元始之初経七千劫一傳自三道立正之後七千年内聴三傳七百年中有其人亦聴傳皆對齋九十日或三十日或九日告盟而授之給玉童玉女依四極科若不依科而傳罪延七祖父母充責鬼官運濛山之石填積夜之河萬劫還生不人之道巳身被風刀之考自然失經終不得仙傳者慎之玄都上品第四篇曰傳瓊文帝章金魚玉龍青繒四十二尺金鈕三𩀱之誓紫度炎光五色錦各五十尺上金五两沉香五斤真朱一斤書刀一口金珠七枚絳文七十尺之誓上清變化七十四方青繒四十尺上金十两金鈕六𩀱好香一斤金魚玉龍之誓九真中経具科截髪為盟今以白絹九十尺准盟法於九真之數青絲一斤絳繒二十四尺此日暉之誓碧繒二十四尺月華之誓金鐶三𩀱无常童子圖變之信丹景道精𨼆地八術觧形遯變流景玉経悉上金十两金魚玉龍各一枚青繒四十尺紫紋四十尺金鐶各三𩀱七變儛天上金五两朱一斤青繒三十二尺之誓信以質心不得有闕闕則違科師以天信投於山棲以拯窮乏餘以供營経書之具不得他散師犯上科奪玉童玉女减筭奪紀注名度還北鄷受者不依科皆䘮魂失神風刀之考不出三年自然失経終不得仙玄都上品第五篇曰消魔智慧玉清𨼆書寳洞飛霄絶玄金章紫鳳赤書八景晨圖金真玉光靈書紫文金璫玉佩金根上経三天正法皆太上大道君元始天王金闕帝君之寳章祕在玉清之宫金房紫户之內典衞靈文玉童玉女各三千人元始之𥘉皆千劫一傳自三天立正之後七百年内聴得三傳百年中有其人聽一傳給玉童玉女依四極明科授者對齋九十日或三十日或九日而傳不依科而傳罪延七玄之祖長充鬼役無有觧脫巳身被風刀之考死充下鬼萬不得仙玄都上品第六篇曰傳消魔智慧寳洞飛霄絶玄金章紫鳳赤書八景晨圖皆上金十两玉札一枚金魚玉龍各一枚紫繒四十尺金根衆経靈書紫文上金五兩金簡玉札各一枚枚長一尺六寸廣二寸四分金魚玉龍各一枚紫繒百尺青紋四十尺三天正法青䌝三十尺青布四十三尺金環五𩀱以為宻誓上金十兩通神之信金真玉光玉佩金璫玉清𨼆書皆金魚玉龍各一枚以為誓信依科不得有闕闕之則師奪玉童玉女注名還度北酆受者皆䘮魂失神考以風刀不出三年自然失経萬不得仙玄都上品第七篇曰七星移度白羽黒翮飛行羽経飛歩天綱躡行七元太上𨼆書靈飛六甲皆太上太帝君太微天帝君登空之道𨼆化之祕章祕在太上瓊宫之上紫房之内侍衞玉童玉女皆三千人依科七千年一傳三天立正之後攺七百年内聽三傳若百年中有其人便傳傳授吿齋九十日或三十日給玉童玉女依四極明科不依科而傳罪延七玄之祖長充北鄷鬼役十苦八難巳身被風刀之考永没幽源萬不得仙玄都上品第八篇曰傳七星移度青紋三十二尺絳繒三十尺鳯紋之羅九十尺金鈕一𩀱白羽黒翮飛行羽経金二兩青繒三十二尺以代截髮噏血之誓飛歩天綱錦三十尺金魚玉龍之誓靈飛六甲白素六十尺金環六𩀱青絲六兩天科以信質心不得有闕闕則違玄都師奪玉童玉女除落青簿玉名移還北鄷受者不依科亡精䘮神罰以風刀不出三年自然失経終不得仙玄都上品第九篇曰傳方丈震靈豁落七元八天𨼆文流金火鈴金神虎符消魔支幹夜照神燭八術𨼆遁紫清玉符五藉洞玄六甲上符五行祕文玄都玉格諸符凡有六百部太上悉以其文摽於舊経之内以為立用傳授明科悉依經科傳受有闕罪同上品有経無符則天魔害人有符無経則思念無感神真不降科云皆不得單行單行罪亦如之科経及符本同出於自然之氣虛無之章㫖故不得獨脩也無科循道萬不成也玄都九真明科中品誡罪篇玄都中品第一篇曰諸是後學七祖以下有殺害人命劫賊攻略謀圖姧滛簒逆之禍九族交通謀反無道其考尤重怨對咎逮積結九隂非赦所原後生皆不得以餘殃之身參渉真経竊受寳文若有苦至志尚自勵首謝七玄重施功徳㧞出幽魂披露巳身於三光之下散髻至頭三年不倦自賫重信㧞於九江贖觧前咎然後聽得淸齋百日奉受寳経然後行事有此之罪而不先自罰責吐首天𡨋而受法者師及弟子同被風刀之考七玄之祖長閉幽源負石擔山萬劫不觧身亡失経明慎之焉玄都中品第二篇曰凡欲修學上法巳身先有重罪手殺人命及酷虐下賤殺害衆生劫略百姓謀圖姦詭九族相交𡜍妬賢能悖逆師主不赦之罪積結九隂皆不得參受妙法循行経文若能苦志吐首先犯効功施徳披露三光散髻叩頭三年陳謝罰校可以贖巳愆㧞出七玄使三界各別然後聽得淸齋百日奉受寳経行事有此之罪而不先自首謝責罰自厲而受経文師及弟子同受風刀之考魂魄十苦八難身没幽泉自然失経七祖父母長充幽徒萬劫不觧學者慎之玄都中品第三篇曰凡是學者受三竒寳文上清祕経軽泄目錄以示不同宣露妙祕軽慢寳章者一犯至十罰功斷事三年然後得更清齋修行過此以上皆罪結九隂考延七祖充役三徒運石負山十苦八難経萬劫得出還更生不人之道巳身罰以風刀之考失明形殘死充下鬼萬不得仙奉者慎之玄都中品第四篇曰凡是學者受上淸寳経三竒寳文不得哭泣臨見死尸及血穢之淹一犯至十罰功斷事一年然後得依科自罰㧞罪太隂更清齋行事過此以上二十四犯奪筭减命玉童玉女還於本官不出三年失経身䘮七玄之祖長充鬼役萬劫不觧學者慎之玄都中品第五篇曰凡學者受上清寳経三洞祕文不得帶近婦人行隂陽之事皆混淬真氣十犯至二十四過罰功斷事三百日然後得清齋循行過此以上玉童玉女各還本官减筭促命不出年失経身亡七祖被考學者慎之玄都中品第六篇曰凡學者受上清寳文三洞祕文而心懷賊害手行虐暴殺生行㓙攻略姧詭𡜍賢妬能攻毀同氣伐敗経師一犯至五聽得罰信謝責九隂㧞罪五嶽斷功禁事十年聽得清齋還修所受過五以上至二十四犯司執殺収攝魂神充責北鄷七祖充役経萬劫得還更生非人之道玉童玉女各反上宫不出一年失経身亡終不得仙學者慎之玄都中品第七篇曰凡學者受上清寳経三洞祕文不得北向便曲及食五辛六畜之肉飲酒邪滛虧道慢法疑貳不專十犯至二十四過聽得依科罰信謝過太隂斷功一年然後聽清齋九十日還修所受過此以上减筭促命身被風刀之考七玄充責三途不過五年失経身亡學者慎之玄都中品第八篇曰凡學者受上清寳経三洞祕文當依科資信詣師告齋然後受経不得不吿盟而妄披寳文凡諸學人得経便師而受焉此皆冥使授之不得軽略竊冩及攺易聖文以意自决毁名古音自作一法四司所紏罪書九隂一犯至三斷功禁事三年案科自罰投信九河更清齋三十日然後得還修行過此以上至二十四過玉童玉女各還本宫减筭奪命身役鬼官七玄之祖長充鬼役萬劫得還更生非人之道學者慎之玄都中品第九篇曰凡受上清寳経三洞竒文當别室安髙牀髙四尺四寸廣五尺異諸凡下之経明燈燒香朝夕禮願常為供養不得使異炁之人冐淹履穢及婦人叅入内觸誤神真此世間所用之科受経之身不得衣服屐履交關非類卧息坐起皆當與物有異犯者從一至二十四過罰功斷事一年然後更清齋修行過此以上為四司所執言過玉清還名鄷都七年身亡失経七祖被考奉者慎之玄都九真明科下品贖罪篇玄都下品第一篇曰凡有後學之人七祖父母生世有犯玄都上品中品第一篇之罪其考尤重結在九隂七祖對𡨚幽掠累劫殃充後代宜逮不釋者皆當露身太隂之下披髪叩頭首罪九隂三年自責年竟賫金鐶九𨾏一兩金人一形投於三河之口以贖七祖之罪㧞出幽魂之難其科朱書五行桐板一枚記曰某年某月某子朔如干日子某郡縣郷里某七祖父母下逮己身有犯玄都上品中品第一篇之罪罪結九隂今謹依科罰金鐶九𨾏金人一形以贖幽魂酷對之罪投書告命歸首水官以自觧㧞罪㓕三官魂昇九天畢以青絲纒物及板以青石沈之臨沈之時北向仰頭呪曰太隂九君執司靈官甲今有言歸吿河源投信九源㧞出七玄怨對㓕觧我身登仙畢如此七祖之考於是釋散得離幽宫上昇福堂巳身便得叅修寳経九年尅有真靈降形與神同升也玄科尤重不得又犯玄都下品第二篇曰凡欲修學上真之道若己身先有犯上品中品第二篇中之罪其考沈結結罪九隂盤塞𡨋中上延七祖考對窮魂纒綿不觧者皆當先於太隂之下北向散髮叩頭首罪三光三年剋責年竟當資真朱一斤書刀一口上金一兩金人一形投於三河之口以贖己罪酷逆之過觧結三官㧞出七祖其科朱書青繒一尺上記曰某年某月某朔日子某郡縣郷里某甲年如干歳甲身先無所見行失玄科手犯元惡上羅玄都上品中品第二篇之罪罪結太隂以依科罰金人一形真朱一斤書刀一枚以贖己身醜惡之罪投書吿命歸首有靈以自觧㧞罪㓕九河身得長生畢以青絲纒物及文以青石沈之臨沉之時北向仰頭咒曰上有太隂執司九君甲今有言歸告河源贖罪觧結㧞度九難怨魂對魄各反自然禍㓕學仙我身得升畢如此九隂之結便得觧釋怨對之魂反於自然也便得修受上清之経九年不虧真靈降形與神合冥也玄科嚴重不得又犯玄都下品第三篇曰凡修上清寳経洞玄祕文已身有犯於上品中品第三篇目之罪其考結於太陽為四司所執言奏玉清犯此之過當斷功克已入室燒香叩頭首謝北向叩齒十通仰頭咒曰太玄幽邈下世希聞軽泄寳真上虧帝尊自収負責伏欵靈門伏願髙上曲垂玄恩降以靈感啓以自然畢便叩頭九過如此三年首謝更淸齋三十日得上觧三官觧考九隂便還修行寳祕宻念剋得飛仙玄科尤重不得又犯玄都下品第四篇曰凡修學上真之道已身有犯上品中品第四篇目之罪罪結九隂懸考玉清犯者當於中庭夜半然三十二燈以洗穢氣清明内外入室燒香北向叩頭首謝所犯叩齒三十六通仰頭祝曰世運交䘮乾尸翳彰穢氣紛紛與真相迎虧科犯誡身入罪郷贖以禮謝洗以明燈禍散三清福充身昌道廕曲流其慶靡央畢又叩頭九過止如此一年更清齋三十日然後得還修事檢行慎科懃心注真九年剋得白日登晨玄都下品第五篇曰凡修上真之道己身有犯上品中品第五篇目之罪罪結太隂考懸青宫犯者當作香湯自浴資油於中庭然二十四燈九十日入室北向叩頭九過首謝所犯叩齒二十四通仰頭祝曰天乾地坤二象交通隂炁混正穢氣彌充䘮神虧寳損落法容謹以明燈上映玄宫散禍九隂福慶歸宗畢如此九十日日竟退齋二十四日然後得還修行真法每在告慎明依科文尅得玄真與形合仙玄科尤重不得又犯玄都下品第六篇曰凡修上真之道巳身有犯上品中品第六篇目之罪其罪尤重為四司所執考結太隂對在幽宫有犯當於太隂之下披髪叩頭首謝玉清觧㧞太隂依科當以𥝠寳散乞貧民作百人食以伺饑乏十年入室叩頭自責北向叩齒九通仰頭咒曰天遐地廣九原開張身履福門懸罪玉京倐羅纒落玄洞靈場散寳㧞罰施以窮粮罪消太隂福生十郷去故奉新方降未央畢又叩頭九過止此乃髙上㧞罪上法標於正科十年如此宿罪滯考並消太隂施行自責年竟更齋百日然後得還修行拯身慎法不得重犯玄都下品第七篇曰凡學上真之道有犯上品中品第七篇目之罪罪充上清犯者當以上香十斤送同學之人合十䖏㧞罪一年入室燒香東向叩頭九遍首謝上真叩齒九通仰頭咒曰五氣錯綜上真不全身染穢炁觸忤洞門傷藏伐命摇動三關違科犯誡羅考自延謹以罰責歸吿帝尊乞白使我於今自宣去離下世上登天仙畢如此一年竟更齋二十四日還修所受剋得真靈下降明科之大不得重犯玄都下品第八篇曰凡學上真之道有犯上品中品第八篇目之罪為監司所執考結三清犯者當以清油一斛於中庭然燈多少適意唯令油盡又以上香十斤奉有経之師以拔其過三年入室燒香北向叩頭九過首謝所犯叩齒十二通咒曰天真髙逺玄光下明縁恃宿慶得覩真経未獲玄科𧇊略天靈違真犯誡沉身分𡨋尅自責厲歸告上清自是之後洗濯故形奉承玄真與道齊并畢三年周竟當更齋九十日先以師受便得修行末経師受當資信詣師度経修行如科剋得上升玄科尤重不得又犯也玄都下品第九篇曰凡修上真之道有犯上品中品第九篇目之罪罪結於九隂懸考於玉清犯者當然七燈於堂前入室叩頭首罪経前叩齒二十四通陳咒曰玉光垂曜仰徹上清執供不禮虧犯寳経恐為四司列罪紫庭謹重齋敬仰希真靈曲垂下降滅罪消刑攝奉玄科永保元貞畢如此一年更齋二十四日然後得還修奉所受玄科尤重宜自明慎不得又犯右太玄九真明科三品二十七條出自太上靈都之宫太上常所寳祕不宣下世今抄立用要訣以付後聖輔明三竒摽以大有素靈之経有骨分合仙便得此文施用㧞罪觧咎釋結散理七玄將無三年真靈見形與子合并同昇九天軽泄玄科罪同上文惟在寳祕宻而奉行玄都九真篇曰傳授経目在九真三品科中者是後聖帝君始佩経之時受於太上道君太上授経出於三品明科以輔三寳竒文上真道経施用之科格其三十一卷獨立餘事及衆経儀品悉在四極明科之中九真三品以三素之上篇置於九帝之宫四極以四司之官緫統衆非糺罰之禁律太真明科以太帝君所受元始天王之玄章上真之儀格其法祕於九天之上太帝之王藏誡於上真之官不行於世九真明科以禁後學四極明科緫領四達其㫖幽徹自無金字玉名不得知聞有得此篇不須學而自成科以禁罪見科知攺知攺則無虧於天地無虧於天地則合於自然合於自然便得上補於真仙也無科而學去仙將為逺矣玄都九真篇曰凡有至志名參玄宫欲單受明科知天法禁然後受経審有骨分亦可先告盟而授之盟信法物悉依三竒寳経之數年限亦同如之不得軽付非真宣露玄文不依科旨身沒鬼官七祖父母履刀山劔樹萬劫不原外如不依科㫖罪同科文彼此之禁學者慎之玄都九真篇曰凡受上法而不承明科虧略天禁罪累七玄考逮一身旣知攺首罪責自厲還修所受而迴又犯其考重先此則骨命不合形與真反魄同鬼位皆不得重首復修於真絰也吾今故以明科悟於未悟旣知而犯將何要㦲奉者慎之太帝君讃翳翳元化初𦕈𦕈晨霞散太寂空玄上寥朗二儀判凝精抱空胞結化孕虚觀含精𧷤神内儵欻啓𡨋旦始悟憂促齡運交反天漢蕭蕭歩虚遊旋行禮玉京稽首歸太無乗風散靈香俯仰帝皇堂飄飄隨虚翔妙唱發竒音吟詠太真章流度四大界十天量無央閬臺發幽夜神燭吐竒光璀璨玉林華燿熠爍瓊堂虚生自然煙蓊欝御玄綱羣真披霄讃寳盖順風昻飛歩詠空歌神唱化道長欝欝大化𨺚濟濟滋道興積學隨日感功滿入大乗福慶逮一切七祖咸得升整駕陵太華廽轡絶霄館靈風鼓空洞香𥙿乗煙散蕭蕭禮靈堂詵詵歩玄漢朗詠啓幽襟㧞度宿根難五苦應時觧流芳注陶灌朗闕峙雲網飛霞翼靈輿提携無跡真窈窕入太虚乗空誦玉篇蕭條詠羽書廣念無不普一切慶有餘天帝君讃至道生空寂玄響隂相求三真本元一氣化理還殊法輪無形內飄飄清觀流凝章不待思結氣合玄符靈唱發空歌吟詠歩虚遊玄化本無跡有跡生道宗遨遊九天際息駕六領宫提𢹂髙上賔反我素靈房道暢虚漠内靈歌發太空形感至寂庭思詠希㣲通雲光翳晨暉停曜廕玉京玄龍不待駕蕭蕭歩虚翔手撥七寳華靈風散竒香妙詠乗襟發𥺤𥺤啓玉章萬氣混元一緫歸三玄梁乗天不云髙遐望九玄遼振翮思玄轡希登暮雲霄積念告靈感期與玉真交曖曖天漢澄飄飄景雲迴三真騰空上控轡迅紫㣲明唱度後身咸令乗景飛㧞出三𡍼難九玄離苦哀太㣲帝君讃太真生空洞瓊羅耀寳臺旋行禮玉京衆仙唱㣲詩迴轉無跡内虚歌契幽期度身上生天吟詠積福基策轡太霞館時復宴景雲飄飄無崖際離離入玄門意適道亦暢心丹志亦分積學随日新詠我素靈文八景運天輿飛霄蔚玄旌素盖乗風迴寥寥入紫清妙讃萬真曲玉響何鈴鈴披㧞九隂籍度身反南庭慶流普一切妙化靡不榮淸浄玄道宗明朗煥太空妙化由静嘿潜想三素宫積念徹玄虚㣲㣲至道通叩詠響玄寂靈唱靡不𨺚丹暉映雲庭紫煙耀玉林煥爛七寳華璀璨摇靈音宫啇自相和妙趣領入袊玄唱種福田廣度無界心後聖金闕帝君讃𦕈莾元始天三象混玄一蕭蕭正道興浩浩大乗逸六氣還正庭総歸泥九室出入逰帝堂精華曜雲日運周反天漢窈窕乗玄七圓華映明珠二景對真光靈暉啓朔㑹玄象交扶桑冥度自相求隂暢玄八荒若䏻餐此精長得御玄綱逰戯九玄臺解憇西羽阿神獸鳴瓊堂飛鳯互參差虚生自然詠真人唱節和化身劫仞庭縁香命清歌建功立福田㧞度後身羅七玄散幽宫去離无難那飛度躡霄嶺翔翮東華宫風雲虚中唱玉音散瓊堂真人詠空歌妙響絶雲房觧我自然襟成我積劫功長嘯九玄上淸瞻覩空同龍吟絶宅府鳯嘯太霄館虚唱无留味哀音乗風散誰䏻究此章精誦素靈讃以解九隂過㧞度七玄難太極真人曰太上素靈洞玄妙經以元始同生靈文旣存衆真詣座燒香禮経旋行誦此二十一篇之章以慶於神庭也玉音激朗淸徹九天其句幽㣲妙趣傍通誦詠一過萬神啓靈恒能究習與帝合真觧宿對之重責㧞七玄之幽宫觧五苦於愁魂度身上於生天妙乎㣲㢤斯之靈文也太上九真明科
